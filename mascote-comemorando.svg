<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a6bff"/>
      <stop offset="1" stop-color="#4a23a0"/>
    </linearGradient>
    <linearGradient id="belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#efe6ff"/>
      <stop offset="1" stop-color="#cdb6ff"/>
    </linearGradient>
  </defs>

  <!-- sparkles -->
  <path d="M40 70 l4 10 l10 4 l-10 4 l-4 10 l-4 -10 l-10 -4 l10 -4 z" fill="#ffd54f"/>
  <path d="M200 64 l3 8 l8 3 l-8 3 l-3 8 l-3 -8 l-8 -3 l8 -3 z" fill="#ffd54f"/>
  <circle cx="32" cy="130" r="4" fill="#ff8fb0"/>
  <circle cx="210" cy="128" r="4" fill="#2f9e8f"/>

  <!-- book -->
  <g>
    <rect x="62" y="196" width="116" height="26" rx="6" fill="#2f9e8f"/>
    <rect x="70" y="190" width="100" height="22" rx="4" fill="#ffffff"/>
    <line x1="120" y1="190" x2="120" y2="212" stroke="#cdb6ff" stroke-width="3"/>
    <rect x="62" y="196" width="116" height="26" rx="6" fill="none" stroke="#1f7a6e" stroke-width="2"/>
  </g>

  <!-- ear tufts -->
  <path d="M74 58 L92 92 L60 86 Z" fill="#4a23a0"/>
  <path d="M166 58 L148 92 L180 86 Z" fill="#4a23a0"/>

  <!-- body -->
  <ellipse cx="120" cy="138" rx="74" ry="82" fill="url(#body)"/>
  <ellipse cx="120" cy="152" rx="44" ry="56" fill="url(#belly)"/>

  <!-- wings raised up cheering -->
  <path d="M52 122 q-30 -22 -28 -52 q16 -6 30 8 q8 22 14 38 z" fill="#5b30b8"/>
  <path d="M188 122 q30 -22 28 -52 q-16 -6 -30 8 q-8 22 -14 38 z" fill="#5b30b8"/>

  <!-- eyes (star sparkle) -->
  <g fill="#2a1758">
    <path d="M96 102 l5 14 l14 4 l-14 4 l-5 14 l-5 -14 l-14 -4 l14 -4 z"/>
    <path d="M144 102 l5 14 l14 4 l-14 4 l-5 14 l-5 -14 l-14 -4 l14 -4 z"/>
  </g>

  <!-- brows up -->
  <path d="M70 86 q24 -10 48 0" fill="none" stroke="#3a1d7a" stroke-width="5" stroke-linecap="round"/>
  <path d="M122 86 q24 -10 48 0" fill="none" stroke="#3a1d7a" stroke-width="5" stroke-linecap="round"/>

  <!-- blush -->
  <ellipse cx="72" cy="146" rx="12" ry="8" fill="#ff8fb0" opacity="0.75"/>
  <ellipse cx="168" cy="146" rx="12" ry="8" fill="#ff8fb0" opacity="0.75"/>

  <!-- beak wide open (big smile) -->
  <path d="M104 138 q16 22 32 0 q-16 16 -32 0 Z" fill="#e8902a"/>
  <path d="M104 138 q16 -10 32 0 q-16 22 -32 0 Z" fill="#ffb13b" stroke="#e8902a" stroke-width="2"/>

  <!-- feet -->
  <path d="M100 214 l-6 10 M100 214 l0 11 M100 214 l6 10" stroke="#ffb13b" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M140 214 l-6 10 M140 214 l0 11 M140 214 l6 10" stroke="#ffb13b" stroke-width="5" stroke-linecap="round" fill="none"/>
</svg>
