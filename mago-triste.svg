<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="hatT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6b6f8a"/><stop offset="1" stop-color="#3f4360"/>
    </linearGradient>
    <linearGradient id="robeT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#64748b"/><stop offset="1" stop-color="#334155"/>
    </linearGradient>
  </defs>
  <!-- staff lowered, dim -->
  <line x1="90" y1="56" x2="94" y2="110" stroke="#7a5230" stroke-width="5" stroke-linecap="round"/>
  <circle cx="89" cy="52" r="7" fill="#9fb6c9"/>
  <!-- robe -->
  <path d="M34 112 Q60 86 86 112 Z" fill="url(#robeT)"/>
  <!-- face -->
  <circle cx="58" cy="62" r="24" fill="#ffd2a6"/>
  <!-- beard -->
  <path d="M40 64 Q58 102 76 64 Q70 78 58 80 Q46 78 40 64 Z" fill="#e2e8f0"/>
  <!-- hat drooping tip -->
  <path d="M70 10 Q40 26 34 50 L82 50 Z" fill="url(#hatT)"/>
  <ellipse cx="58" cy="50" rx="28" ry="7" fill="#3f4360"/>
  <!-- sad brows (\ /) -->
  <path d="M46 52 q5 3 9 5" stroke="#3f4360" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <path d="M71 52 q-5 3 -9 5" stroke="#3f4360" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <!-- eyes -->
  <circle cx="50" cy="62" r="3" fill="#27324a"/>
  <circle cx="66" cy="62" r="3" fill="#27324a"/>
  <!-- tear -->
  <path d="M50 66 q-3 8 0 10 q3 -2 0 -10 z" fill="#6ee7ff"/>
  <!-- frown -->
  <path d="M51 74 q7 -5 14 0" stroke="#a3582b" stroke-width="2.4" fill="none" stroke-linecap="round"/>
</svg>
