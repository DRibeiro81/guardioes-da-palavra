    </linearGradient>
    <linearGradient id="robeN" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/><stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>
  <!-- staff -->
