<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a6bff"/>
      <stop offset="1" stop-color="#4a23a0"/>
    </linearGradient>
    <linearGradient id="belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#efe6ff"/>
      <stop offset="1" stop-color="#cdb6ff"/>
    </linearGradient>
  </defs>

  <!-- thought bubble -->
  <g>
    <circle cx="186" cy="58" r="26" fill="#fffefb" stroke="#cdb6ff" stroke-width="2"/>
    <circle cx="158" cy="86" r="9" fill="#fffefb" stroke="#cdb6ff" stroke-width="2"/>
    <circle cx="146" cy="100" r="5" fill="#fffefb" stroke="#cdb6ff" stroke-width="2"/>
    <text x="186" y="68" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#7c4dff" text-anchor="middle">?</text>
  </g>

  <!-- book -->
  <g>
    <rect x="62" y="196" width="116" height="26" rx="6" fill="#2f9e8f"/>
    <rect x="70" y="190" width="100" height="22" rx="4" fill="#ffffff"/>
    <line x1="120" y1="190" x2="120" y2="212" stroke="#cdb6ff" stroke-width="3"/>
    <rect x="62" y="196" width="116" height="26" rx="6" fill="none" stroke="#1f7a6e" stroke-width="2"/>
  </g>

  <!-- ear tufts -->
  <path d="M74 58 L92 92 L60 86 Z" fill="#4a23a0"/>
  <path d="M166 58 L148 92 L180 86 Z" fill="#4a23a0"/>

  <!-- body -->
  <ellipse cx="120" cy="138" rx="74" ry="82" fill="url(#body)"/>
  <ellipse cx="120" cy="152" rx="44" ry="56" fill="url(#belly)"/>

  <!-- left wing resting, right wing up to chin (thinking) -->
  <path d="M48 120 q-14 34 8 64 q14 4 22 -8 q-18 -26 -10 -58 z" fill="#5b30b8"/>
  <path d="M186 132 q22 10 18 34 q-6 14 -22 12 q-16 -4 -14 -22 q2 -16 18 -24 z" fill="#5b30b8"/>
  <!-- wing tip near beak -->
  <ellipse cx="138" cy="158" rx="12" ry="9" fill="#5b30b8"/>

  <!-- eyes looking up-right -->
  <circle cx="96" cy="120" r="32" fill="#fffefb"/>
  <circle cx="144" cy="120" r="32" fill="#fffefb"/>
  <circle cx="104" cy="110" r="13" fill="#2a1758"/>
  <circle cx="152" cy="110" r="13" fill="#2a1758"/>
  <circle cx="109" cy="106" r="4" fill="#ffffff"/>
  <circle cx="157" cy="106" r="4" fill="#ffffff"/>

  <!-- one brow raised (curious) -->
  <path d="M70 96 q26 -6 50 2" fill="none" stroke="#3a1d7a" stroke-width="5" stroke-linecap="round"/>
  <path d="M122 84 q26 -8 50 2" fill="none" stroke="#3a1d7a" stroke-width="5" stroke-linecap="round"/>

  <!-- beak (small, pondering) -->
  <path d="M118 132 L130 145 L118 153 L106 145 Z" fill="#ffb13b" stroke="#e8902a" stroke-width="2"/>

  <!-- feet -->
  <path d="M100 214 l-6 10 M100 214 l0 11 M100 214 l6 10" stroke="#ffb13b" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M140 214 l-6 10 M140 214 l0 11 M140 214 l6 10" stroke="#ffb13b" stroke-width="5" stroke-linecap="round" fill="none"/>
</svg>
