<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="hatR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c2bff"/><stop offset="1" stop-color="#4b1ec3"/>
    </linearGradient>
    <linearGradient id="robeR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ef4444"/><stop offset="1" stop-color="#991b1b"/>
    </linearGradient>
  </defs>
  <!-- steam puffs -->
  <circle cx="34" cy="34" r="4" fill="#cbd5e1" opacity="0.7"/>
  <circle cx="28" cy="28" r="3" fill="#cbd5e1" opacity="0.6"/>
  <circle cx="86" cy="34" r="4" fill="#cbd5e1" opacity="0.7"/>
  <circle cx="92" cy="28" r="3" fill="#cbd5e1" opacity="0.6"/>
  <!-- staff sparking -->
  <line x1="94" y1="42" x2="90" y2="110" stroke="#8b5a2b" stroke-width="5" stroke-linecap="round"/>
  <path d="M95 30 l3 8 -5 -2 4 8 -8 -6 1 -8 z" fill="#ff5a36"/>
  <!-- robe -->
  <path d="M34 112 Q60 82 86 112 Z" fill="url(#robeR)"/>
  <!-- face flushed -->
  <circle cx="58" cy="62" r="24" fill="#ffc6a0"/>
  <circle cx="44" cy="68" r="4.5" fill="#ff6b6b" opacity="0.6"/>
  <circle cx="72" cy="68" r="4.5" fill="#ff6b6b" opacity="0.6"/>
  <!-- beard -->
  <path d="M40 64 Q58 102 76 64 Q70 78 58 80 Q46 78 40 64 Z" fill="#eef2f7"/>
  <!-- hat -->
  <path d="M58 8 L34 50 L82 50 Z" fill="url(#hatR)"/>
  <ellipse cx="58" cy="50" rx="28" ry="7" fill="#4b1ec3"/>
  <!-- angry brows (V) -->
  <path d="M44 50 l11 5" stroke="#3a1d6e" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M72 50 l-11 5" stroke="#3a1d6e" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- glaring eyes -->
  <circle cx="51" cy="61" r="3.2" fill="#27324a"/>
  <circle cx="67" cy="61" r="3.2" fill="#27324a"/>
  <!-- gritted mouth -->
  <path d="M50 73 h18" stroke="#7a3f1d" stroke-width="3" stroke-linecap="round"/>
  <path d="M54 71 v4 M60 71 v4 M64 71 v4" stroke="#7a3f1d" stroke-width="1.4"/>
</svg>
