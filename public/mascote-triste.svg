<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a6bff"/>
      <stop offset="1" stop-color="#4a23a0"/>
    </linearGradient>
    <linearGradient id="belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#efe6ff"/>
      <stop offset="1" stop-color="#cdb6ff"/>
    </linearGradient>
  </defs>

  <!-- book -->
  <g>
    <rect x="62" y="196" width="116" height="26" rx="6" fill="#2f9e8f"/>
    <rect x="70" y="190" width="100" height="22" rx="4" fill="#ffffff"/>
    <line x1="120" y1="190" x2="120" y2="212" stroke="#cdb6ff" stroke-width="3"/>
    <rect x="62" y="196" width="116" height="26" rx="6" fill="none" stroke="#1f7a6e" stroke-width="2"/>
  </g>

  <!-- ear tufts -->
  <path d="M74 58 L92 92 L60 86 Z" fill="#4a23a0"/>
  <path d="M166 58 L148 92 L180 86 Z" fill="#4a23a0"/>

  <!-- body -->
  <ellipse cx="120" cy="138" rx="74" ry="82" fill="url(#body)"/>
  <ellipse cx="120" cy="152" rx="44" ry="56" fill="url(#belly)"/>

  <!-- wings drooping, one hugging -->
  <path d="M48 126 q-18 30 -4 58 q14 8 24 -4 q-20 -24 -16 -52 z" fill="#5b30b8"/>
  <path d="M192 126 q18 30 4 58 q-14 8 -24 -4 q20 -24 16 -52 z" fill="#5b30b8"/>

  <!-- eyes (droopy, looking down) -->
  <circle cx="96" cy="122" r="30" fill="#fffefb"/>
  <circle cx="144" cy="122" r="30" fill="#fffefb"/>
  <circle cx="96" cy="132" r="12" fill="#2a1758"/>
  <circle cx="144" cy="132" r="12" fill="#2a1758"/>
  <circle cx="100" cy="128" r="4" fill="#ffffff"/>
  <circle cx="148" cy="128" r="4" fill="#ffffff"/>
  <!-- upper lids droop -->
  <path d="M66 116 q30 -8 60 4" fill="none" stroke="#4a23a0" stroke-width="9" stroke-linecap="round"/>
  <path d="M114 120 q30 -12 60 -4" fill="none" stroke="#4a23a0" stroke-width="9" stroke-linecap="round"/>

  <!-- sad inner-up brows -->
  <path d="M76 92 q22 6 40 14" fill="none" stroke="#3a1d7a" stroke-width="5" stroke-linecap="round"/>
  <path d="M164 92 q-22 6 -40 14" fill="none" stroke="#3a1d7a" stroke-width="5" stroke-linecap="round"/>

  <!-- tear -->
  <path d="M84 150 q-6 10 0 16 q6 -6 0 -16 z" fill="#5ec6ff"/>

  <!-- beak (small frown) -->
  <path d="M120 134 L131 147 L120 154 L109 147 Z" fill="#ffb13b" stroke="#e8902a" stroke-width="2"/>
  <path d="M108 166 q12 -8 24 0" fill="none" stroke="#3a1d7a" stroke-width="4" stroke-linecap="round"/>

  <!-- feet -->
  <path d="M100 214 l-6 10 M100 214 l0 11 M100 214 l6 10" stroke="#ffb13b" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M140 214 l-6 10 M140 214 l0 11 M140 214 l6 10" stroke="#ffb13b" stroke-width="5" stroke-linecap="round" fill="none"/>
</svg>
