<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="hatI" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c5cff"/><stop offset="1" stop-color="#4b32c3"/>
    </linearGradient>
    <linearGradient id="robeI" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b"/><stop offset="1" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <!-- staff tapping, little clock -->
  <line x1="93" y1="46" x2="93" y2="110" stroke="#8b5a2b" stroke-width="5" stroke-linecap="round"/>
  <circle cx="93" cy="40" r="9" fill="#ffd166"/>
  <circle cx="93" cy="40" r="6" fill="#fff3c4"/>
  <line x1="93" y1="40" x2="93" y2="36" stroke="#b45309" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="93" y1="40" x2="96" y2="41" stroke="#b45309" stroke-width="1.6" stroke-linecap="round"/>
  <!-- robe with crossed-arm hint -->
  <path d="M34 112 Q60 84 86 112 Z" fill="url(#robeI)"/>
  <path d="M40 98 q18 -10 36 0" stroke="#b45309" stroke-width="3" fill="none"/>
  <!-- face -->
  <circle cx="58" cy="62" r="24" fill="#ffd9b3"/>
  <!-- sweat drop -->
  <path d="M78 50 q-3 7 0 9 q3 -2 0 -9 z" fill="#6ee7ff"/>
  <!-- beard -->
  <path d="M40 64 Q58 100 76 64 Q70 78 58 80 Q46 78 40 64 Z" fill="#f1f5f9"/>
  <!-- hat -->
  <path d="M58 8 L34 50 L82 50 Z" fill="url(#hatI)"/>
  <ellipse cx="58" cy="50" rx="28" ry="7" fill="#4b32c3"/>
  <!-- one raised brow (impatient) -->
  <path d="M45 50 q5 -3 10 -1" stroke="#7c5cff" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <path d="M61 54 q5 0 10 0" stroke="#7c5cff" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <!-- eyes side-glance -->
  <circle cx="52" cy="60" r="3" fill="#27324a"/>
  <circle cx="68" cy="60" r="3" fill="#27324a"/>
  <!-- flat/smirk mouth -->
  <path d="M51 72 q7 1 14 -2" stroke="#a3582b" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <!-- impatience marks -->
  <path d="M20 54 h8 M22 60 h8" stroke="#b45309" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
</svg>
